name: Calendar allowlist sync

# Regenerates src/portal-visible-plan-ids.js — the set of LEF plan IDs whose
# scheduled sessions appear on the marketing calendar. LEF's Redpoint HQ portal
# has no public calendar SPA to mirror, so scripts/discover-plan-ids.mjs derives
# the list straight from the GraphQL storefront (every LEF-facility plan with
# sessions over the horizon, minus the bookable-slot denylist in
# src/calendar-config.js). When LEF adds or retires a public program, the set
# drifts and this workflow opens a PR with the diff.
#
# Runs daily and on manual trigger. To re-run on demand: GitHub → Actions →
# "Calendar allowlist sync" → Run workflow.
#
# Pure fetch (Node built-in) — no Playwright, no browser, no npm install.

on:
  schedule:
    - cron: "13 4 * * *"  # daily at 04:13 UTC (pre-business hours)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Discover plan allowlist
        run: |
          node scripts/discover-plan-ids.mjs \
            --write=src/portal-visible-plan-ids.js

      - name: Check for drift
        id: drift
        run: |
          if git diff --quiet src/portal-visible-plan-ids.js; then
            echo "No drift — exiting clean."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Drift detected:"
            git --no-pager diff src/portal-visible-plan-ids.js
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.drift.outputs.changed == 'true'
        # SHA-pinned (not tag-pinned): peter-evans/create-pull-request is a
        # third-party action. Post the March 2026 tj-actions/Trivy supply-chain
        # attacks, tags are rewriteable and can be force-pushed to a malicious
        # commit, so we pin to the immutable commit SHA. Dependabot
        # (.github/dependabot.yml) bumps this SHA + comment automatically.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: bot/calendar-allowlist
          title: "chore: sync calendar allowlist with LEF portal"
          commit-message: "chore: sync calendar allowlist with LEF portal"
          add-paths: src/portal-visible-plan-ids.js
          delete-branch: true
          labels: calendar-allowlist
          body: |
            Auto-generated by `.github/workflows/calendar-allowlist.yml`.

            The set of LEF plan IDs with scheduled sessions has drifted from
            what's committed in `src/portal-visible-plan-ids.js`.

            ### How to review
            - **Added IDs** → likely a new public program LEF scheduled in the
              portal. Merging surfaces it on the marketing calendar.
            - **Removed IDs** → likely a program retired or with no upcoming
              sessions. Merging stops surfacing it.
            - **Unexpected change** → spot-check the portal at
              <https://portal.lefclimbing.com/lef> before merging.

            Source: `StorefrontCalendarQuery` over LEF's facilityId, minus the
            bookable-slot denylist (see `src/calendar-config.js`).
